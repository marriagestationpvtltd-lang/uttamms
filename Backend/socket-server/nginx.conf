# Nginx reverse-proxy / load-balancer config for the Socket.IO server.
#
# This file distributes incoming WebSocket connections across multiple
# Node.js instances managed by PM2.  Because all instances share state via
# the Redis adapter, session stickiness is NOT required — Nginx can use any
# upstream balancing policy (round-robin shown below).
#
# Installation:
#   sudo cp nginx.conf /etc/nginx/sites-available/socket-server
#   sudo ln -sf /etc/nginx/sites-available/socket-server /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Adjust 'server_name', SSL certificate paths, and upstream port range to
# match your actual deployment.

# ── Upstream pool ─────────────────────────────────────────────────────────────
# List each PM2 instance here.  With `instances: 4` in ecosystem.config.js
# PM2 binds ports 3000–3003; adjust accordingly.
#
# Round-robin is the default and works perfectly with the Redis adapter since
# all instances share the same Socket.IO room/event state.
upstream socketio_nodes {
    # Connections are distributed evenly (round-robin)
    server 127.0.0.1:3000;
    server 127.0.0.1:3001;
    server 127.0.0.1:3002;
    server 127.0.0.1:3003;

    # Keep connections to upstream alive (reduces TCP handshake overhead)
    keepalive 64;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name socket.example.com;   # ← replace with your domain

    return 301 https://$host$request_uri;
}

# ── HTTPS (WebSocket) reverse proxy ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name socket.example.com;   # ← replace with your domain

    # SSL — replace with your certificate paths (Let's Encrypt example)
    ssl_certificate     /etc/letsencrypt/live/socket.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/socket.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Proxy timeouts — must be generous for long-lived WebSocket connections
    proxy_connect_timeout  60s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;

    # WebSocket upgrade headers
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Pass real client IP to Node.js
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Socket.IO endpoint ────────────────────────────────────────────────────
    # All Socket.IO traffic (WebSocket upgrade + polling fallback if enabled)
    location /socket.io/ {
        proxy_pass http://socketio_nodes;

        # Buffer settings — disable for real-time streaming
        proxy_buffering off;
    }

    # ── WebSocket proxy endpoint ──────────────────────────────────────────────
    # Alternative WebSocket endpoint for clients using /socket/ path
    location /socket/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    # ── REST endpoints (upload, health, API calls) ────────────────────────────
    location / {
        proxy_pass http://socketio_nodes;
    }

    # Security headers
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection       "1; mode=block";
}
