# Nginx reverse-proxy config for the Socket.IO server.
#
# Default configuration assumes a SINGLE Node.js instance (port 3001) managed
# by PM2.  This is the safe default because the server.js does not implement a
# Redis adapter; running multiple instances without shared Redis state causes
# Socket.IO rooms to be process-local and breaks real-time message delivery.
#
# If you add the Redis adapter to server.js and want to scale horizontally,
# uncomment the additional upstream entries (3002-3004), change
# exec_mode to 'cluster' and instances to the desired count in
# ecosystem.config.js, and update the upstream block below accordingly.
#
# Installation:
#   sudo cp nginx.conf /etc/nginx/sites-available/socket-server
#   sudo ln -sf /etc/nginx/sites-available/socket-server /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Adjust 'server_name' and SSL certificate paths to match your deployment.

# ── Upstream pool ─────────────────────────────────────────────────────────────
# Single instance by default.  Uncomment extra entries only after the Redis
# adapter is configured in server.js.
upstream socketio_nodes {
    server 127.0.0.1:3001;
    # server 127.0.0.1:3002;  # enable only with Redis adapter
    # server 127.0.0.1:3003;  # enable only with Redis adapter
    # server 127.0.0.1:3004;  # enable only with Redis adapter

    # Keep connections to upstream alive (reduces TCP handshake overhead)
    keepalive 64;
}

# Map Upgrade header to appropriate Connection value:
#   WebSocket upgrade request  → "upgrade"
#   Regular HTTP/polling request → "keep-alive"
# Without this map, unconditionally sending Connection: upgrade for polling
# requests can confuse some upstream servers.
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       keep-alive;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name socket.example.com;   # ← replace with your domain

    return 301 https://$host$request_uri;
}

# ── HTTPS (WebSocket) reverse proxy ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name socket.example.com;   # ← replace with your domain

    # SSL — replace with your certificate paths (Let's Encrypt example)
    ssl_certificate     /etc/letsencrypt/live/socket.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/socket.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Proxy timeouts — must be generous for long-lived WebSocket connections
    proxy_connect_timeout  60s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;

    # WebSocket upgrade headers — use the map above so polling requests get
    # Connection: keep-alive while WebSocket requests get Connection: upgrade.
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Pass real client IP to Node.js
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Socket.IO endpoint ────────────────────────────────────────────────────
    # All Socket.IO traffic (WebSocket upgrade + polling fallback if enabled)
    location /socket.io/ {
        # Handle CORS preflight (OPTIONS) before proxying.
        # We reflect $http_origin here solely to unblock browser preflight
        # requests; actual origin validation (allowlist enforcement) is
        # performed by the Node.js CORS middleware for every real request.
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass http://socketio_nodes;

        # Reflect the request origin so the Node.js CORS middleware sees the
        # correct value instead of a wildcard from nginx.
        proxy_set_header Origin $http_origin;

        # Buffer settings — disable for real-time streaming
        proxy_buffering off;
    }

    # ── WebSocket proxy endpoint ──────────────────────────────────────────────
    # Alternative WebSocket endpoint for clients using /socket/ path
    location /socket/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    # ── REST endpoints (upload, health, API calls) ────────────────────────────
    location / {
        proxy_pass http://socketio_nodes;
    }

    # Security headers
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection       "1; mode=block";
}
